; ============================================================
; polybar config - Tokyo Night Edition
; ============================================================

[colors]
bg            = #1a1b26
bg-alt        = #24283b
fg            = #c0caf5
fg-alt        = #565f89
active        = #7aa2f7
inactive      = #3b4261
urgent        = #f7768e
green         = #9ece6a
yellow        = #e0af68
purple        = #bb9af7
cyan          = #7dcfff
orange        = #ff9e64

[bar/main]
width                    = 100%
height                   = 28
offset-y                 = 2
radius                   = 0
background               = ${colors.bg}
foreground               = ${colors.fg}

bottom                   = false
border-top-size          = 0
border-bottom-size       = 0

module-margin-left       = 1
module-margin-right      = 1
padding-left             = 10
padding-right            = 10

wm-restack               = bspwm
override-redirect        = false

monitor                  = ${env:MONITOR:}
monitor-fallback         = true

tray-position            = right
tray-padding             = 4
tray-background          = ${colors.bg}

font-0                   = JetBrainsMono Nerd Font:size=11:antialias=true
font-1                   = "Material Design Icons:size=12:antialias=true"
font-2                   = "Noto Sans:size=10:antialias=true"

cursor-click             = pointer
cursor-scroll            = ns-resize

enable-ipc               = true

modules-left             = bspwm
modules-center           = date
modules-right            = pulseaudio network battery powermenu

; ============================================================
; MODULES
; ============================================================

[module/bspwm]
type        = internal/bspwm
pin-workspaces          = true
inline-mode             = false
enable-click            = true
enable-scroll           = true

format                   = <label-state> <label-mode>
label-monitor            = 
label-monitor-padding   = 1

label-active            = 
label-active-foreground = ${colors.active}
label-active-background = ${colors.bg}
label-active-padding    = 1
label-active-margin     = 1

label-occupied          = 
label-occupied-foreground = ${colors.fg}
label-occupied-background = ${colors.bg}
label-occupied-padding  = 1
label-occupied-margin   = 1

label-urgent            = 
label-urgent-foreground = ${colors.urgent}
label-urgent-background = ${colors.bg}
label-urgent-padding    = 1
label-urgent-margin     = 1

label-empty             = 
label-empty-foreground  = ${colors.inactive}
label-empty-background  = ${colors.bg}
label-empty-padding     = 1
label-empty-margin      = 1

label-separator         = 
label-separator-foreground = ${colors.inactive}

[module/date]
type                        = internal/date
interval                    = 1
date                        =   %a %d-%m-%Y
date-alt                    =   %A %d %B %Y
time                        =   %H:%M
time-alt                    =   %H:%M:%S
format-prefix               = 
format-prefix-foreground    = ${colors.cyan}
format                      = <label>
label                       = %date%  %time%
label-foreground            = ${colors.fg}

[module/pulseaudio]
type                    = internal/pulseaudio
use-ui-max              = false

format-volume           = <label-volume>
label-volume            =   %percentage%%
label-volume-foreground = ${colors.green}
label-muted             =   muted
label-muted-foreground  = ${colors.urgent}

[module/network]
type                        = internal/network
interface                   = $(ip route get 1 | awk '{print $5}' | head -1)
interval                    = 3

format-connected            = <label-connected>
label-connected             =   %essid%
label-connected-foreground  = ${colors.cyan}

format-disconnected         = <label-disconnected>
label-disconnected          =   no wifi
label-disconnected-foreground = ${colors.fg-alt}

[module/battery]
type                        = internal/battery
full-at                     = 95
battery                     = BAT0
adapter                     = ADP1
time-format                 = %H:%M

format-charging             = <animation-charging> <label-charging>
label-charging              = %percentage%%
label-charging-foreground   = ${colors.yellow}

format-discharging          = <label-discharging>
label-discharging           =   %percentage%%
label-discharging-foreground = ${colors.fg}

format-full                 = <label-full>
label-full                  =   %percentage%%
label-full-foreground       = ${colors.green}

animation-charging          = ⡀⡠⢄⠂⠁⢀⣀
animation-charging-foreground = ${colors.yellow}
animation-charging-framerate  = 750

[module/powermenu]
type        = custom/text
content     =  ⏻
content-foreground = ${colors.orange}
click-left  = rofi -show power-menu -modi power-menu:rofi-power-menu -config ~/.config/rofi/config.rasi
