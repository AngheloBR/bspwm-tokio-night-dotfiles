# ============================================================
# lazygit config - Tokyo Night
# ============================================================

gui:
  theme:
    lightTheme: false

    activeBorderColor:
      - "#7aa2f7"
      - bold

    inactiveBorderColor:
      - "#565f89"

    optionsTextColor:
      - "#7aa2f7"

    selectedLineBgColor:
      - "#2f3549"

    selectedRangeBgColor:
      - "#2f3549"

    cherryPickedCommitBgColor:
      - "#bb9af7"

    cherryPickedCommitFgColor:
      - "#1a1b26"

    unstagedChangesColor:
      - "#f7768e"

    defaultFgColor:
      - "#c0caf5"

    searchingActiveBorderColor:
      - "#e0af68"

  authorColors:
    "*": "#73daca"

  border: rounded

  language: "en"

git:
  paging:
    colorArg: always
    pager: delta --dark --paging=never
