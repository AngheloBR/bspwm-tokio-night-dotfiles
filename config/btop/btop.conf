# ============================================================
# btop config - Tokyo Night Edition
# ============================================================

color_theme = "tokyo-night"
theme_background = false
truecolor = true
force_tty = false

# Layout
update_ms = 2000
rounded_corners = true
graph_symbol = "braille"
graph_symbol_cpu = "braille"
graph_symbol_mem = "braille"
graph_symbol_net = "braille"
graph_symbol_proc = "braille"
shown_boxes = "cpu mem net proc"
box_border = true
show_boxes = true

# CPU
cpu_sensor = "Auto"
show_uptime = true
check_temp = true

# Memory
mem_below_net = false
zfs_arc = false

# Network
net_iface = "wlan0"
net_sync = false

# Process
proc_per_cpu = true
proc_tree = true
proc_colors = true
proc_gradient = true
proc_filtering = true

# Colors
presets = "default"
