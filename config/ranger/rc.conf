# ============================================================
# ranger config - Tokyo Night Edition
# ============================================================

# Apariencia
set colorscheme tokyo-night
set column_ratios 1,3,4
set draw_borders none
set mouse_support true
set show_hidden false

# Previsualización
set preview_images true
set preview_images_method kitty
set use_preview_image true
set preview_direct_details true
set preview_files true
set preview_script ~/.config/ranger/scope.sh

# Comportamiento
set autoupdate_cumulative_size true
set automatically_count_files true
set sort_case_insensitive true
set sort_directories_first true
set sort_natural true
set vcs_aware false

# Iconos
default_linemode devicons2
set linemode devicons2

# Atajos
map <C-v> shell "$PAGER %s"
map <C-o> shell "$OPENER %s"
map <C-f> search
map <C-c> quit
map q quit
map Q quit!
map i display_file
map zh set hidden!
map zp set preview_images!

# Terminal
set idle_delay 0
set update_delay 0.1
set one_indexed true
set wrap_plaintext_previews true
