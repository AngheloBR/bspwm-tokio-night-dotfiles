# ============================================================
# picom.conf - Tokyo Night Edition (con animaciones suaves)
# ============================================================

# --- Sombreado ---
shadow = true;
shadow-radius = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.4;
shadow-red = 0.1;
shadow-green = 0.1;
shadow-blue = 0.15;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Dunst'",
  "class_g = 'Rofi'",
  "class_g = 'Polybar'",
  "class_g = 'firefox' && argb",
  "_GTK_FRAME_EXTENTS@:c"
];

# --- Opacidad ---
inactive-opacity = 0.95;
active-opacity = 1.0;
frame-opacity = 0.9;
inactive-opacity-override = false;
opacity-rule = [
  "99:class_g = 'Polybar'",
  "99:class_g = 'Rofi'",
  "95:class_g = 'Dunst'"
];

# --- Desenfoque (blur) ---
blur: {
  method = "dual_kawase";
  strength = 5;
  background = false;
  background-frame = false;
  background-fixed = false;
  kern = "3x3box";
};

blur-background = false;
blur-background-frame = false;
blur-background-fixed = false;

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

# --- Animaciones (soporte para picom-ibhagwan-git) ---
wintypes: {
  normal = { fade = true; };
  dropdown_menu = { fade = true; };
  popup_menu = { fade = true; };
  tooltip = { fade = true; };
  notification = { fade = true; };
};

corner-radius = 12;
round-borders = 1;
rounded-corners-exclude = [
  "class_g = 'Polybar'"
];

# --- Animaciones (ibhagwan fork) ---
# Compatible con picom-ibhagwan-git (AUR)
# Descomenta si usas ese fork:
# animations = true;
# animation-dampening = 0.4;
# animation-in-dampening = 0.4;
# animation-out-dampening = 0.2;
# animation-streak = 0.3;
# animation-clamping = false;
# animation-window-mass = 0.5;
# animation-for-open-window = "zoom";
# animation-for-close-window = "zoom";

# --- Transiciones suaves ---
fading = true;
fade-delta = 5;
fade-in-step = 0.03;
fade-out-step = 0.03;

no-fading-openclose = false;
fade-exclude = [
  "class_g = 'Polybar'"
];

# --- Sincronización vertical ---
unredir-if-possible = true;
backend = "glx";
vsync = true;

# --- Rendimiento ---
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-transient = true;
detect-client-leader = true;
use-ewmh-active-win = false;
respect-size-hints = false;

monitor-reload = true;

glx-no-stencil = true;
glx-copy-from-front = false;
glx-use-copysubbuffermesa = true;
xrender-sync-fence = true;

# --- Exclusiones ---
shadow-exclude = [
  "name = 'Polybar'",
  "class_g = 'firefox'",
  "class_g = 'Polybar'"
];

focus-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'Rofi'",
  "class_g = 'Dunst'"
];

detect-rounded-pixmaps = true;
detect-client-opacity = true;
refresh-rate = 0;
