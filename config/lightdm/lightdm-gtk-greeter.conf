# ============================================================
# lightdm-gtk-greeter - Tokyo Night (macOS style)
# ============================================================
# Para usar con lightdm-gtk-greeter
# Colocar en: /etc/lightdm/lightdm-gtk-greeter.conf (como root)
# ============================================================

[greeter]
background = /usr/share/backgrounds/tokyo-night-wallpaper.jpg
theme-name = Tokyonight-Dark-BL
icon-theme-name = Papirus-Dark
cursor-theme-name = Bibata-Modern-Classic
font-name = Noto Sans 10
xft-antialias = true
xft-hintstyle = hintslight
xft-rgba = rgb
indicators = ~host;~spacer;~clock;~spacer;~session;~power
clock-format = %H:%M
position = 50%,center 50%,center
default-user-image = #avatar
screensaver-timeout = 60
