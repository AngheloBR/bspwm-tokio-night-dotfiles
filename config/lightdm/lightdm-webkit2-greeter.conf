# ============================================================
# lightdm-webkit2-greeter - Tokyo Night macOS
# ============================================================
# Para usar con lightdm-webkit2-greeter
# Colocar en: /etc/lightdm/lightdm-webkit2-greeter.conf (como root)
# ============================================================

[greeter]
webkit-theme = tokyo-night-macos
background = /usr/share/backgrounds/tokyo-night-wallpaper.jpg
font-size = 12
user-image = default
time-format = %H:%M
date-format = %A, %d %B
indicators = clock, session, power
